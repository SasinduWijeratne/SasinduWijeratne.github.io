<details class="stats-corner" open>
  <summary class="stats-corner__summary">
    <span>Visitor map</span>
    <span class="stats-corner__badge">ClustrMaps</span>
  </summary>
  <div class="stats-corner__body">
    <p class="stats-corner__text">
      Recent visits shown roughly by location (widget by <a href="https://www.clustrmaps.com/" target="_blank" rel="noopener noreferrer">ClustrMaps</a>).
    </p>
    <div class="stats-corner__map">
      <script
        type="text/javascript"
        id="clustrmaps"
        src="https://cdn.clustrmaps.com/map_v2.js?cl=ffffff&amp;w=a&amp;t=n&amp;d={{ site.clustrmaps_map_id }}"
        async></script>
    </div>
  </div>
</details>
