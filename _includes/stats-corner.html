{%- assign gc_site = site.goatcounter_url | remove: '/count' -%}
<details class="stats-corner" open>
  <summary class="stats-corner__summary">
    <span>Visitor stats</span>
    <span class="stats-corner__badge">GoatCounter</span>
  </summary>
  <div class="stats-corner__body">
    <p class="stats-corner__text">
      View visits by region and other breakdowns on GoatCounter — opens in a new tab.
    </p>
    <a class="stats-corner__cta" href="{{ gc_site }}/" target="_blank" rel="noopener noreferrer">Open visitor dashboard ↗</a>
  </div>
</details>
